<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GENZEST | Decode Startups & Growth Moats</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <script>
        const savedTheme = localStorage.getItem("genzest-theme") || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute("data-theme", savedTheme);
        tailwind.config = { theme: { extend: { colors: { themeBg: 'var(--bg-base)', themeCard: 'var(--card-bg)' } } } }
    </script>

    <style>
        :root, html[data-theme="dark"] { --bg-base: #07020d; --text-primary: #FAFAFA; --text-secondary: #94a3b8; --card-bg: #0f0a1e; --border-color: rgba(168, 85, 247, 0.25); --navbar-bg: rgba(7, 2, 13, 0.85); --input-bg: #0a0516; }
        body { background-color: var(--bg-base); color: var(--text-primary); font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="sticky top-0 z-40 backdrop-blur-md border-b bg-[var(--navbar-bg)] border-[var(--border-color)]">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="/index.html" class="font-bold text-lg text-[var(--text-primary)]">GENZEST</a>
            <button id="menu-trigger" class="p-2 rounded-lg bg-[var(--card-bg)] border border-[var(--border-color)]">Menu</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-12 flex-grow w-full">
        <input type="text" id="search-input" placeholder="Search startups..." class="w-full px-5 py-4 mb-10 bg-[var(--input-bg)] border-2 border-[var(--border-color)] rounded-2xl outline-none">
        
        <div id="cases-container" class="grid md:grid-cols-3 gap-6">
            <div class="col-span-full py-16 text-center text-purple-400">Syncing live sheets...</div>
        </div>
    </main>

    <div id="footer-component"></div>

    <!-- ABSOLUTE PATH SCRIPTS FIX -->
    <script src="/sheets/sheet-api.js"></script>
    <script src="/sheets/newsletter.js"></script>
    <script src="/assets/js/layout-handler.js"></script>
    <script src="/assets/js/footer.js"></script>
    <script src="/assets/js/ui-enhancer.js"></script>
    <script src="/assets/js/main-cards.js"></script>
</body>
</html>
