<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GENZEST | Decode Startups & Growth Moats</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <script>
        // Force Theme Detection on Load
        const savedTheme = localStorage.getItem("genzest-theme") || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute("data-theme", savedTheme);
        tailwind.config = { darkMode: 'class' }
    </script>

    <style>
        :root { --bg-base: #07020d; --text-base: #ffffff; --card-bg: #0f0a1e; }
        html[data-theme="light"] { --bg-base: #f8fafc; --text-base: #0f172a; --card-bg: #ffffff; }
        
        body { background-color: var(--bg-base); color: var(--text-base); font-family: 'Space Grotesk', sans-serif; transition: background 0.3s, color 0.3s; }
        .scrollbar-none::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Navbar -->
    <header class="sticky top-0 z-40 backdrop-blur-md bg-[var(--bg-base)]/80 border-b border-white/10">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="index.html" class="font-bold text-lg tracking-wider">GENZEST</a>
            <button id="menu-trigger" class="p-2 bg-white/5 rounded-lg border border-white/10">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
            </button>
        </div>
    </header>

    <!-- Drawer -->
    <div id="drawer-overlay" class="fixed inset-0 bg-black/60 z-50 hidden opacity-0 transition-opacity"></div>
    <div id="drawer-panel" class="fixed top-0 right-0 h-full w-[85vw] max-w-sm bg-[var(--bg-base)] border-l border-white/10 z-50 transform translate-x-full transition-transform p-6">
        <button id="drawer-close" class="mb-8">Close</button>
        <nav class="flex flex-col gap-4">
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
        </nav>
        <div class="mt-10 flex gap-3">
            <button id="theme-btn-dark" class="px-4 py-2 border rounded">Dark</button>
            <button id="theme-btn-light" class="px-4 py-2 border rounded">Light</button>
        </div>
    </div>

    <!-- Hero -->
    <section class="py-12 text-center px-4">
        <h1 id="dyn-hero-title" class="text-5xl font-['Caveat'] mb-6"></h1>
        <p id="dyn-hero-subtitle" class="max-w-2xl mx-auto p-6 rounded-2xl border border-purple-500/30"></p>
    </section>

    <!-- Search -->
    <div class="max-w-2xl mx-auto px-4 mb-10">
        <input type="text" id="search-input" placeholder="Search..." class="w-full p-4 rounded-2xl bg-[var(--bg-base)] border border-purple-500/30">
    </div>

    <!-- Cards -->
    <main class="max-w-7xl mx-auto px-4 mb-20">
        <div id="cases-container" class="flex md:grid flex-row md:grid-cols-3 gap-6 overflow-x-auto scrollbar-none pb-8">
            <div id="loading-spinner">Loading...</div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="sheets/sheet-api.js"></script>
    <script src="assets/js/layout-handler.js"></script>
    <script src="assets/js/ui-enhancer.js"></script>
    <script src="assets/js/main-cards.js"></script>
</body>
</html>
