<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GENZEST | Decode Startups & Growth Moats</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind Custom Configurations -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        themeBg: '#07020d',
                        themeCard: '#0f0a1e'
                    }
                }
            }
        }
    </script>

    <style>
        /* Base system setup */
        body {
            background-color: #07020d;
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
        }
        
        /* Hide scrollbars for Instagram swipe layout but keep functional */
        .scrollbar-none::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-none {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Custom vertical scrollbar for desktop page layout */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #07020d;
        }
        ::-webkit-scrollbar-thumb {
            background: #2e1065;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #4c1d95;
        }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col selection:bg-[#FF2E93] selection:text-white">

    <!-- 1. HEADER / NAVIGATION BAR -->
    <header class="sticky top-0 z-50 backdrop-blur-md bg-[#07020d]/80 border-b border-white/5 transition-all">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <!-- Brand Logo -->
            <a href="index.html" class="flex items-center gap-2.5 group">
                <span class="w-8 h-8 rounded-lg bg-gradient-to-tr from-[#FF2E93] to-[#A855F7] flex items-center justify-center shadow-lg shadow-purple-500/25">
                    <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </span>
                <span class="font-bold text-lg tracking-wider text-white group-hover:text-[#00FFFF] transition">GENZEST</span>
            </a>

            <!-- Navigation Actions -->
            <div class="flex items-center gap-4">
                <span class="hidden sm:inline-block px-3 py-1 text-[10px] font-mono tracking-widest text-[#A855F7] bg-[#A855F7]/10 border border-[#A855F7]/30 rounded-full uppercase">
                    ● CONSOLE V2
                </span>
                <!-- Hamburger Menu Button -->
                <button class="p-2 rounded-lg bg-white/5 border border-white/10 hover:bg-white/10 transition">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                </button>
            </div>
        </div>
    </header>

    <!-- 2. HERO HEADER BLOCK -->
    <section class="relative pt-12 pb-6 flex flex-col items-center justify-center text-center overflow-visible">
        <!-- Ambient background glow elements -->
        <div class="absolute top-20 left-1/2 -translate-x-1/2 w-[70vw] h-[400px] bg-[#A855F7]/5 rounded-full blur-[120px] pointer-events-none"></div>
        
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
            <!-- Dynamic Compact Cursive Heading -->
            <h1 id="dyn-hero-title" class="opacity-0 transition-opacity duration-300">
                <!-- Injected dynamically by layout-handler.js -->
            </h1>
            
            <!-- High-Contrast Glassmorphic Subtitle Card -->
            <p id="dyn-hero-subtitle" class="opacity-0 transition-opacity duration-300">
                <!-- Injected dynamically by layout-handler.js -->
            </p>
        </div>
    </section>

    <!-- 3. PREMIUM INTERACTIVE SEARCH SYSTEM -->
    <div class="max-w-2xl mx-auto w-full px-4 mb-14 relative z-20">
        <div class="relative">
            <input type="text" id="search-input" placeholder="Search Zepto, Blinkit, marketing moats..." class="w-full px-5 py-4 pl-12 bg-[#0A0516]/95 border-2 border-purple-500/30 text-white placeholder-white/60 rounded-2xl outline-none transition duration-300 focus:border-[#00FFFF] focus:shadow-[0_0_25px_rgba(0,255,255,0.25)]">
            <span class="absolute left-4 top-1/2 transform -translate-y-1/2 text-white/50">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </span>
        </div>
    </div>

    <!-- 4. PLAYBOOK CARDS DYNAMIC GRID (INSTAGRAM SWIPE ON MOBILE) -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mb-20 relative z-10 flex-grow w-full">
        <!-- flex-row & overflow-x-auto powers the mobile swiper, md:grid restores classic clean grid on desktop -->
        <div id="cases-container" class="flex md:grid flex-row md:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8 overflow-x-auto md:overflow-x-visible snap-x snap-mandatory md:snap-none scrollbar-none pb-8 md:pb-0">
            <!-- Loading backup block inside grid -->
            <div id="loading-spinner" class="col-span-full flex flex-col items-center justify-center py-16 w-full">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-[#A855F7] mb-4"></div>
                <p class="text-xs font-mono text-purple-400">Syncing live sheets...</p>
            </div>
        </div>

        <!-- Instagram Swipe Guidance Tag (Visible only on mobile) -->
        <div class="md:hidden text-center text-[10px] font-mono tracking-widest text-[#A855F7]/80 uppercase mt-4">
            Swipe Left-Right &rarr;
        </div>
    </main>

    <!-- 5. NEWSLETTER AUTOMATED CARD SECTION -->
    <section class="max-w-4xl mx-auto w-full px-4 mb-24 relative z-10">
        <div class="relative p-8 md:p-12 rounded-3xl overflow-hidden bg-gradient-to-br from-[#120826] to-[#07020d] border border-[#A855F7]/30 shadow-[0_0_40px_rgba(168,85,247,0.15)] text-center">
            <!-- Background lights -->
            <div class="absolute -top-24 -left-24 w-48 h-48 bg-purple-600/10 rounded-full blur-3xl"></div>
            <div class="absolute -bottom-24 -right-24 w-48 h-48 bg-cyan-600/10 rounded-full blur-3xl"></div>
            
            <h2 class="text-3xl md:text-4xl font-extrabold text-white mb-4 tracking-tight">Studies Directly In Your Inbox</h2>
            <p class="text-sm md:text-base text-neutral-300 max-w-lg mx-auto mb-8">Join modern founders and builders getting high-signal marketing breakdowns every week.</p>
            
            <!-- Newsletter Capture Action Node -->
            <form id="newsletter-form" class="max-w-md mx-auto flex flex-col gap-4">
                <input type="email" id="newsletter-email" required placeholder="Enter your professional email" class="px-5 py-4 bg-neutral-950/80 border border-purple-500/20 text-white placeholder-neutral-500 rounded-2xl outline-none transition duration-300 focus:border-[#A855F7]/60 focus:ring-1 focus:ring-[#A855F7]/40">
                <button type="submit" id="newsletter-btn" class="w-full px-5 py-4 font-bold text-white bg-gradient-to-r from-[#FF2E93] to-[#A855F7] rounded-2xl shadow-lg transition duration-300 hover:opacity-90 active:scale-[0.98]">
                    Subscribe Now
                </button>
                <span id="form-feedback" class="hidden text-xs font-mono mt-2"></span>
            </form>
        </div>
    </section>

    <!-- 6. DYNAMIC AUTOMATED FOOTER MOUNT NODE -->
    <div id="footer-component"></div>

    <!-- ==========================================
         CORE SCRIPTS MOUNT BLOCK (DO NOT DISTURB ORDER)
         ========================================== -->
    
    <!-- A. Database Fetch Engine -->
    <script src="sheets/sheet-api.js"></script>

    <!-- B. Newsletter Action Processor -->
    <script src="sheets/newsletter.js"></script>

    <!-- C. Typography Cursive Handler -->
    <script src="assets/js/layout-handler.js"></script>

    <!-- D. Automated Footer Sync -->
    <script src="assets/js/footer.js"></script>

    <!-- E. Cyberpunk UI Customizer (Search bar glow, card borders, contrast overrides) -->
    <script src="assets/js/ui-enhancer.js"></script>

    <!-- F. Playbook Card Instant Renderer and Search Filter -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const container = document.getElementById("cases-container");
            const searchInput = document.getElementById("search-input");

            async function loadAndRenderCards() {
                if (typeof getLiveStartupData !== "function") {
                    setTimeout(loadAndRenderCards, 250);
                    return;
                }

                try {
                    const cases = await getLiveStartupData();
                    if (cases && cases.length > 0) {
                        container.innerHTML = ""; // Clear loader spinner

                        cases.forEach(item => {
                            const card = document.createElement("div");
                            
                            // Essential horizontal swipe layout metric for mobile (w-[85vw] limits width so next card peeks)
                            card.className = "w-[85vw] sm:w-[350px] md:w-auto flex-shrink-0 snap-start bg-[#0f0a1e] rounded-2xl border border-white/5 overflow-hidden flex flex-col cursor-pointer transition-all duration-300 sexy-glowing-card group";
                            
                            // Beautiful default image placeholder if layout database lacks source URL
                            const imageUrl = item.imageUrl && item.imageUrl.trim() !== "" ? item.imageUrl : "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=600&q=80";

                            // Render industry badge dynamically ONLY if it is defined in the sheet (No hardcoding fallback STARTUP!)
                            const industryBadge = item.industry && item.industry.trim() !== "" 
                                ? `<span class="inline-block px-2.5 py-1 text-[10px] font-bold tracking-wider uppercase rounded bg-purple-950/50 text-[#00FFFF] border border-purple-500/20">${item.industry.trim()}</span>` 
                                : '';

                            card.innerHTML = `
                                <div class="relative w-full aspect-video overflow-hidden bg-neutral-900 rounded-t-2xl">
                                    <img src="${imageUrl}" alt="${item.title}" class="w-full h-full object-cover transition duration-500 group-hover:scale-105" onerror="this.src='https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=600&q=80'">
                                </div>
                                <div class="p-5 flex flex-col flex-grow">
                                    <div class="flex items-center justify-between mb-3">
                                        ${industryBadge}
                                        <svg class="w-4 h-4 text-white/40 group-hover:text-cyan-400 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                                    </div>
                                    <h3 class="vibrant-card-title mb-2">${item.title}</h3>
                                    <p class="vibrant-card-desc mb-6 flex-grow">${item.hook}</p>
                                    <div class="flex items-center justify-between mt-auto pt-4 border-t border-white/5">
                                        <span class="vibrant-card-link text-[11px] font-mono tracking-widest uppercase">READ FULL PLAYBOOK</span>
                                        <span class="w-2 h-2 rounded-full bg-emerald-400 shadow-[0_0_8px_#34d399]"></span>
                                    </div>
                                </div>
                            `;

                            // Trigger redirect callback
                            card.onclick = () => {
                                window.location.href = `breakdown.html?id=${encodeURIComponent(item.id)}`;
                            };

                            container.appendChild(card);
                        });

                        // Fire theme watchdog
                        if (window.enhanceDOMElements) window.enhanceDOMElements();

                    } else {
                        container.innerHTML = `<div class="col-span-full text-center py-12 text-sm font-mono text-neutral-400 w-full">No breakdowns found in dynamic sheet.</div>`;
                    }
                } catch (error) {
                    console.error("Error drawing cases board:", error);
                    container.innerHTML = `<div class="col-span-full text-center py-12 text-sm font-mono text-red-400 w-full">Connection delay. Refreshing engine...</div>`;
                }
            }

            // Real-time local filtering engine
            if (searchInput) {
                searchInput.addEventListener("input", function(e) {
                    const query = e.target.value.toLowerCase().trim();
                    const cards = document.querySelectorAll(".sexy-glowing-card");
                    
                    cards.forEach(card => {
                        const title = card.querySelector(".vibrant-card-title")?.textContent.toLowerCase() || "";
                        const desc = card.querySelector(".vibrant-card-desc")?.textContent.toLowerCase() || "";
                        
                        if (title.includes(query) || desc.includes(query)) {
                            // Maintain horizontal flex structure when filtering on mobile
                            const displayMode = window.innerWidth < 768 ? "block" : "flex";
                            card.style.setProperty("display", displayMode, "important");
                        } else {
                            card.style.setProperty("display", "none", "important");
                        }
                    });
                });
            }

            // Start board builder
            loadAndRenderCards();
        });
    </script>
</body>
</html>
