<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Primary SEO Meta Tags -->
    <title>GENZEST | Decode Startup Growth Models & Marketing Moats</title>
    <meta name="description" content="In-depth startup case studies, unit economics, and defensive growth strategies for founders and marketers.">
    <meta property="og:title" content="GENZEST | Decode Startups & Growth Moats">
    <meta property="og:description" content="Master the art of startup analysis with our weekly growth playbooks.">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Space+Grotesk:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- 1. INSTANT THEME SYNCHRONIZATION -->
    <script>
        const savedTheme = localStorage.getItem("genzest-theme") || 
                           (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute("data-theme", savedTheme);
        tailwind.config = { theme: { extend: { colors: { themeBg: 'var(--bg-base)', themeCard: 'var(--card-bg)' } } } }
    </script>

    <style>
        :root, html[data-theme="dark"] { --bg-base: #07020d; --text-primary: #FAFAFA; --text-secondary: #94a3b8; --card-bg: #0f0a1e; --border-color: rgba(168, 85, 247, 0.25); --input-bg: #0a0516; --glow-primary: rgba(168, 85, 247, 0.25); --navbar-bg: rgba(7, 2, 13, 0.85); --drawer-bg: #0f0a1e; --shadow-color: rgba(0, 0, 0, 0.6); }
        html[data-theme="light"] { --bg-base: #f8fafc; --text-primary: #0f172a; --text-secondary: #475569; --card-bg: #ffffff; --border-color: rgba(168, 85, 247, 0.2); --input-bg: #ffffff; --glow-primary: rgba(168, 85, 247, 0.12); --navbar-bg: rgba(248, 250, 252, 0.85); --drawer-bg: #ffffff; --shadow-color: rgba(0, 0, 0, 0.05); }
        body { background-color: var(--bg-base); color: var(--text-primary); font-family: 'Space Grotesk', sans-serif; overflow-x: hidden; transition: background-color 0.3s ease, color 0.3s ease; }
        .scrollbar-none::-webkit-scrollbar { display: none !important; }
        .cursive-highlight { display: inline-block !important; font-family: 'Caveat', cursive !important; background-image: linear-gradient(135deg, #FF007F 0%, #D000FF 50%, #00FFFF 100%) !important; -webkit-background-clip: text !important; background-clip: text !important; color: transparent !important; filter: drop-shadow(0 2px 14px rgba(255, 0, 127, 0.65)) !important; }
    </style>
</head>
<body class="min-h-screen flex flex-col selection:bg-[#FF2E93] selection:text-white">

    <!-- HEADER -->
    <header class="sticky top-0 z-40 backdrop-blur-md transition-all border-b bg-[var(--navbar-bg)] border-[var(--border-color)]">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2.5 group" aria-label="GENZEST Home">
                <span class="w-8 h-8 rounded-lg bg-gradient-to-tr from-[#FF2E93] to-[#A855F7] flex items-center justify-center shadow-lg shadow-purple-500/25">
                    <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </span>
                <span class="font-bold text-lg tracking-wider text-[var(--text-primary)] group-hover:text-[#00FFFF] transition">GENZEST</span>
            </a>
            <button id="menu-trigger" aria-label="Open Navigation Menu" class="p-2 rounded-lg bg-[var(--card-bg)] border border-[var(--border-color)] text-[var(--text-primary)] hover:opacity-80 transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
            </button>
        </div>
    </header>

    <!-- HERO -->
    <section class="relative pt-12 pb-6 flex flex-col items-center justify-center text-center">
        <div class="absolute top-20 left-1/2 -translate-x-1/2 w-[70vw] h-[400px] bg-[#A855F7]/5 rounded-full blur-[120px] pointer-events-none"></div>
        <div class="max-w-5xl mx-auto px-4 relative z-10">
            <h1 id="dyn-hero-title" class="text-5xl sm:text-8xl font-bold mb-8 font-['Caveat'] text-[var(--text-primary)]">Loading...</h1>
            <p id="dyn-hero-subtitle" class="max-w-3xl mx-auto text-sm sm:text-base font-semibold px-6 py-5 rounded-2xl border border-[var(--border-color)] bg-[var(--card-bg)] shadow-[0_0_25px_var(--glow-primary)]">Decoding growth one startup at a time.</p>
        </div>
    </section>

    <!-- SEARCH -->
    <div class="max-w-2xl mx-auto w-full px-4 mb-14 relative z-20">
        <input type="text" id="search-input" placeholder="Search startups, marketing moats..." class="w-full px-5 py-4 pl-12 bg-[var(--input-bg)] border-2 border-[var(--border-color)] rounded-2xl outline-none focus:border-[#A855F7] transition">
    </div>

    <!-- CARDS -->
    <main class="max-w-7xl mx-auto px-4 mb-20 relative z-10 flex-grow w-full">
        <div id="cases-container" class="flex md:grid flex-row md:grid-cols-2 lg:grid-cols-3 gap-8 overflow-x-auto scrollbar-none pb-8">
            <div id="loading-spinner" class="col-span-full flex justify-center py-16"><div class="animate-spin rounded-full h-10 w-10 border-b-2 border-[#A855F7]"></div></div>
        </div>
    </main>

    <!-- NEWSLETTER -->
    <section class="max-w-4xl mx-auto w-full px-4 mb-24 relative z-10">
        <div class="p-8 rounded-3xl bg-[var(--card-bg)] border border-[var(--border-color)] text-center">
            <h2 class="text-3xl font-extrabold mb-4">Weekly Growth Playbooks</h2>
            <form id="newsletter-form" class="max-w-md mx-auto flex flex-col gap-4">
                <input type="email" id="newsletter-email" required placeholder="Enter professional email" class="px-5 py-4 bg-[var(--bg-base)] border border-[var(--border-color)] rounded-2xl outline-none">
                <button type="submit" class="w-full px-5 py-4 font-bold text-white bg-gradient-to-r from-[#FF2E93] to-[#A855F7] rounded-2xl transition hover:opacity-90">Subscribe</button>
            </form>
        </div>
    </section>

    <div id="footer-component"></div>

    <!-- CORE SCRIPTS -->
    <script src="sheets/sheet-api.js" defer></script>
    <script src="sheets/newsletter.js" defer></script>
    <script src="assets/js/layout-handler.js" defer></script>
    <script src="assets/js/footer.js" defer></script>
    <script src="assets/js/ui-enhancer.js" defer></script>
    <script src="assets/js/main-cards.js" defer></script>
</body>
</html>
