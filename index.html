<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GENZEST | Decode Startups & Growth Moats</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind Custom Configurations -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        themeBg: '#07020d',
                        themeCard: '#0f0a1e'
                    }
                }
            }
        }
    </script>

    <style>
        /* Base system setup with theme fallback colors */
        :root {
            --bg-base: #07020d;
            --text-base: #ffffff;
            --border-base: rgba(255, 255, 255, 0.05);
            --header-bg: rgba(7, 2, 13, 0.8);
        }

        /* Light Theme Override Variables */
        html[data-theme="light"] {
            --bg-base: #f8fafc;
            --text-base: #0f172a;
            --border-base: rgba(15, 23, 42, 0.08);
            --header-bg: rgba(248, 250, 252, 0.8);
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-base);
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        /* Hide scrollbars for Instagram swipe layout but keep functional */
        .scrollbar-none::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-none {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Custom vertical scrollbar for desktop page layout */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #07020d;
        }
        ::-webkit-scrollbar-thumb {
            background: #2e1065;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #4c1d95;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col selection:bg-[#FF2E93] selection:text-white">

    <!-- 1. HEADER / NAVIGATION BAR -->
    <header class="sticky top-0 z-40 backdrop-blur-md transition-all border-b" style="background-color: var(--header-bg); border-color: var(--border-base);">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <!-- Brand Logo -->
            <a href="index.html" class="flex items-center gap-2.5 group">
                <span class="w-8 h-8 rounded-lg bg-gradient-to-tr from-[#FF2E93] to-[#A855F7] flex items-center justify-center shadow-lg shadow-purple-500/25">
                    <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </span>
                <span class="font-bold text-lg tracking-wider group-hover:text-[#00FFFF] transition" style="color: var(--text-base);">GENZEST</span>
            </a>

            <!-- Navigation Actions -->
            <div class="flex items-center gap-4">
                <span class="hidden sm:inline-block px-3 py-1 text-[10px] font-mono tracking-widest text-[#A855F7] bg-[#A855F7]/10 border border-[#A855F7]/30 rounded-full uppercase">
                    ● CONSOLE V2
                </span>
                <!-- Hamburger Menu Button -->
                <button id="menu-trigger" class="p-2 rounded-lg bg-white/5 border border-white/10 hover:bg-white/10 transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                </button>
            </div>
        </div>
    </header>

    <!-- MOBILE NAVIGATION SLIDE-OUT DRAWER OVERLAY -->
    <div id="drawer-overlay" class="fixed inset-0 bg-black/60 z-50 backdrop-blur-sm hidden opacity-0 transition-opacity duration-300"></div>
    
    <!-- MOBILE DRAWER PANEL -->
    <div id="drawer-panel" class="fixed top-0 right-0 h-full w-[85vw] max-w-sm bg-[#0f0a1e] border-l border-white/10 z-50 transform translate-x-full transition-transform duration-300 shadow-2xl flex flex-col p-6">
        <!-- Close Header -->
        <div class="flex items-center justify-between pb-6 border-b border-white/10">
            <span class="font-bold tracking-wider text-[#A855F7] text-sm font-mono">CONSOLE MENU</span>
            <button id="drawer-close" class="p-2 rounded-lg bg-white/5 border border-white/10 hover:bg-white/10 text-white transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>

        <!-- Navigation Links inside Drawer -->
        <nav class="flex flex-col gap-4 py-8 flex-grow">
            <a href="index.html" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-white/5 text-white font-medium hover:bg-white/10 transition">
                <span>&bull;</span> Home (Business Breakdowns)
            </a>
            <a href="about.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-neutral-300 font-medium hover:bg-white/5 transition">
                <span>&bull;</span> About Us
            </a>
            <a href="disclaimer.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-neutral-300 font-medium hover:bg-white/5 transition">
                <span>&bull;</span> Disclaimer
            </a>
            <a href="privacy.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-neutral-300 font-medium hover:bg-white/5 transition">
                <span>&bull;</span> Privacy Policy
            </a>
        </nav>

        <!-- Dynamic Theme Toggler Block in Drawer -->
        <div class="pt-6 border-t border-white/10">
            <h4 class="text-xs font-mono tracking-widest text-neutral-400 uppercase mb-4">Select Interface Vibe</h4>
            <div class="grid grid-cols-2 gap-3">
                <button id="theme-btn-dark" class="px-4 py-2.5 rounded-xl border font-mono text-xs font-bold transition flex items-center justify-center gap-2">
                    <span class="w-2.5 h-2.5 rounded-full bg-purple-500"></span> Dark
                </button>
                <button id="theme-btn-light" class="px-4 py-2.5 rounded-xl border font-mono text-xs font-bold transition flex items-center justify-center gap-2">
                    <span class="w-2.5 h-2.5 rounded-full bg-amber-400"></span> Light
                </button>
            </div>
        </div>
    </div>

    <!-- 2. HERO HEADER BLOCK -->
    <section class="relative pt-12 pb-6 flex flex-col items-center justify-center text-center overflow-visible">
        <div class="absolute top-20 left-1/2 -translate-x-1/2 w-[70vw] h-[400px] bg-[#A855F7]/5 rounded-full blur-[120px] pointer-events-none"></div>
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
            <h1 id="dyn-hero-title" class="opacity-0 transition-opacity duration-300"></h1>
            <p id="dyn-hero-subtitle" class="opacity-0 transition-opacity duration-300"></p>
        </div>
    </section>

    <!-- 3. PREMIUM INTERACTIVE SEARCH SYSTEM -->
    <div class="max-w-2xl mx-auto w-full px-4 mb-14 relative z-20">
        <div class="relative">
            <input type="text" id="search-input" placeholder="Search Zepto, Blinkit, marketing moats..." class="w-full px-5 py-4 pl-12 bg-[#0A0516]/95 border-2 border-purple-500/30 text-white placeholder-white/60 rounded-2xl outline-none transition duration-300 focus:border-[#00FFFF] focus:shadow-[0_0_25px_rgba(0,255,255,0.25)]">
            <span class="absolute left-4 top-1/2 transform -translate-y-1/2 text-white/50">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </span>
        </div>
    </div>

    <!-- 4. PLAYBOOK CARDS DYNAMIC GRID (INSTAGRAM SWIPE ON MOBILE) -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mb-20 relative z-10 flex-grow w-full">
        <div id="cases-container" class="flex md:grid flex-row md:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8 overflow-x-auto md:overflow-x-visible snap-x snap-mandatory md:snap-none scrollbar-none pb-8 md:pb-0">
            <div id="loading-spinner" class="col-span-full flex flex-col items-center justify-center py-16 w-full">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-[#A855F7] mb-4"></div>
                <p class="text-xs font-mono text-purple-400">Syncing live sheets...</p>
            </div>
        </div>
        <div class="md:hidden text-center text-[10px] font-mono tracking-widest text-[#A855F7]/80 uppercase mt-4">
            Swipe Left-Right &rarr;
        </div>
    </main>

    <!-- 5. NEWSLETTER AUTOMATED CARD SECTION -->
    <section class="max-w-4xl mx-auto w-full px-4 mb-24 relative z-10">
        <div class="relative p-8 md:p-12 rounded-3xl overflow-hidden bg-gradient-to-br from-[#120826] to-[#07020d] border border-[#A855F7]/30 shadow-[0_0_40px_rgba(168,85,247,0.15)] text-center">
            <div class="absolute -top-24 -left-24 w-48 h-48 bg-purple-600/10 rounded-full blur-3xl"></div>
            <div class="absolute -bottom-24 -right-24 w-48 h-48 bg-cyan-600/10 rounded-full blur-3xl"></div>
            
            <h2 class="text-3xl md:text-4xl font-extrabold text-white mb-4 tracking-tight">Studies Directly In Your Inbox</h2>
            <p class="text-sm md:text-base text-neutral-300 max-w-lg mx-auto mb-8">Join modern founders and builders getting high-signal marketing breakdowns every week.</p>
            
            <form id="newsletter-form" class="max-w-md mx-auto flex flex-col gap-4">
                <input type="email" id="newsletter-email" required placeholder="Enter your professional email" class="px-5 py-4 bg-neutral-950/80 border border-purple-500/20 text-white placeholder-neutral-500 rounded-2xl outline-none transition duration-300 focus:border-[#A855F7]/60 focus:ring-1 focus:ring-[#A855F7]/40">
                <button type="submit" id="newsletter-btn" class="w-full px-5 py-4 font-bold text-white bg-gradient-to-r from-[#FF2E93] to-[#A855F7] rounded-2xl shadow-lg transition duration-300 hover:opacity-90 active:scale-[0.98]">
                    Subscribe Now
                </button>
                <span id="form-feedback" class="hidden text-xs font-mono mt-2"></span>
            </form>
        </div>
    </section>

    <!-- 6. DYNAMIC AUTOMATED FOOTER MOUNT NODE -->
    <div id="footer-component"></div>

    <!-- ==========================================
         CORE SCRIPTS MOUNT BLOCK (LINKED SEAMLESSLY)
         ========================================== -->
    <script src="sheets/sheet-api.js"></script>
    <script src="sheets/newsletter.js"></script>
    <script src="assets/js/layout-handler.js"></script>
    <script src="assets/js/footer.js"></script>
    <script src="assets/js/ui-enhancer.js"></script>
    
    <!-- Part 2 Script Connector (Loads rendering and swipe engines) -->
    <script src="assets/js/main-cards.js"></script>
</body>
</html>
