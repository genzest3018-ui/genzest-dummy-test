<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GENZEST — Startup Business Model & Marketing Blueprints</title>
    <!-- Tailwind CSS Engine with Variable Mapping -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandBg: 'var(--bg-master)',
                        brandCard: 'var(--bg-card)',
                        brandBorder: 'var(--border-master)',
                        brandTextMuted: 'var(--text-muted)',
                        accentViolet: '#7C3AED',
                        accentPink: '#DB2777',
                        accentEmerald: '#10B981',
                    }
                }
            }
        }
    </script>
    <!-- FIXED: Using rel="stylesheet" to correctly load css -->
    <link rel="stylesheet" href="assets/css/global.css">
</head>
<body class="bg-brandBg transition-colors duration-200">

    <!-- NAVBAR INJECTION SLOT -->
    <div id="navbar-component"></div>

    <!-- HERO PANEL SECTION -->
    <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-20 pb-12 text-center">
        <!-- DYNAMIC CONFIG HEADINGS FROM LAYOUT SHEET -->
        <h1 id="dyn-hero-title" class="text-4xl sm:text-6xl font-extrabold tracking-tight mb-6">
            Loading master headers...
        </h1>
        <p id="dyn-hero-subtitle" class="max-w-2xl mx-auto text-sm sm:text-base leading-relaxed mb-10">
            Fetching sync status from configurations cloud...
        </p>

        <!-- INSTANT INTERACTION FILTER SEARCH BAR -->
        <div class="max-w-md mx-auto relative mb-16">
            <input type="text" id="search-bar" placeholder="Search Zepto, Blinkit, marketing moats..." class="w-full text-sm px-5 py-3.5 rounded-xl border focus:outline-none focus:border-purple-500/50 transition duration-300 shadow-inner">
        </div>
    </section>

    <!-- LIVE DATABASE INTERACTION GRID ROW (INSTAGRAM CAROUSEL) -->
    <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-20">
        <!-- Loader Panel -->
        <div id="loader-panel" class="hidden text-center py-10">
            <div class="w-6 h-6 border-2 border-t-purple-500 border-brandBorder rounded-full animate-spin mx-auto mb-2"></div>
            <p class="text-xs font-mono">Syncing live sheets...</p>
        </div>

        <!-- Master dynamic tracking card wrapper grid -->
        <div id="case-studies-grid"></div>
    </section>

    <!-- NEWSLETTER CAPTURE CONSOLE -->
    <section class="max-w-3xl mx-auto px-4 pb-24 text-center">
        <div class="bg-brandCard border border-brandBorder rounded-3xl p-8 sm:p-12 relative overflow-hidden">
            <span class="text-[10px] font-mono tracking-widest uppercase text-accentPink font-bold">Subscribe to Growth</span>
            <h2 class="text-2xl sm:text-3xl font-extrabold mt-2 mb-4">Get Fresh Case Studies Directly In Your Inbox</h2>
            
            <form id="newsletter-form" class="max-w-sm mx-auto space-y-3 mt-6">
                <input type="email" id="newsletter-email" placeholder="Enter your professional email" required class="w-full text-xs px-4 py-3 rounded-xl border focus:outline-none focus:border-pink-500/50 transition text-center sm:text-left">
                <button type="submit" id="newsletter-btn" class="w-full bg-gradient-to-r from-accentViolet to-accentPink text-white font-bold text-xs py-3 rounded-xl hover:opacity-90 transition shadow-lg shadow-purple-500/10">Subscribe Now</button>
                <div id="form-feedback" class="hidden"></div>
            </form>
        </div>
    </section>

    <!-- FOOTER INJECTION SLOT -->
    <div id="footer-component"></div>

    <!-- CORE MODULE CONTROLLERS -->
    <script src="assets/js/navbar.js"></script>
    <script src="assets/js/footer.js"></script>
    <script src="sheets/sheet-api.js"></script>
    <script src="assets/js/layout-handler.js"></script>
    <script src="assets/js/companies.js"></script>
    <script src="sheets/newsletter.js"></script>
</body>
</html>
