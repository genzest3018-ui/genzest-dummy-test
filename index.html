<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GENZEST | Decode Startups & Growth Moats</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- 1. INSTANT THEME SYNCHRONIZATION -->
    <script>
        const savedTheme = localStorage.getItem("genzest-theme") || 
                           (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute("data-theme", savedTheme);
        
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        themeBg: 'var(--bg-base)',
                        themeCard: 'var(--card-bg)'
                    }
                }
            }
        }
    </script>

    <!-- 2. HIGH-CONTRAST NEON STYLING SHEETS -->
    <style>
        :root, html[data-theme="dark"] {
            --bg-base: #07020d;
            --text-primary: #FAFAFA;
            --text-secondary: #94a3b8;
            --card-bg: #0f0a1e;
            --border-color: rgba(168, 85, 247, 0.25);
            --input-bg: #0a0516;
            --glow-primary: rgba(168, 85, 247, 0.25);
            --glow-secondary: rgba(0, 255, 255, 0.15);
            --navbar-bg: rgba(7, 2, 13, 0.85);
            --badge-bg: rgba(168, 85, 247, 0.15);
            --badge-text: #00FFFF;
            --link-color: #00FFFF;
            --drawer-bg: #0f0a1e;
            --shadow-color: rgba(0, 0, 0, 0.6);
        }

        html[data-theme="light"] {
            --bg-base: #f8fafc;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --card-bg: #ffffff;
            --border-color: rgba(168, 85, 247, 0.2);
            --input-bg: #ffffff;
            --glow-primary: rgba(168, 85, 247, 0.12);
            --glow-secondary: rgba(168, 85, 247, 0.08);
            --navbar-bg: rgba(248, 250, 252, 0.85);
            --badge-bg: rgba(168, 85, 247, 0.08);
            --badge-text: #A855F7;
            --link-color: #A855F7;
            --drawer-bg: #ffffff;
            --shadow-color: rgba(0, 0, 0, 0.05);
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        /* Disable scrollbars for Instagram carousel */
        .scrollbar-none::-webkit-scrollbar {
            display: none !important;
        }
        .scrollbar-none {
            -ms-overflow-style: none !important;
            scrollbar-width: none !important;
        }

        /* --- THEME-PROOF GLOWING NEON CURSIVE (Stops Chrome Muddy/Black bug!) --- */
        .cursive-highlight {
            display: inline-block !important;
            font-family: 'Caveat', cursive !important;
            background-image: linear-gradient(135deg, #FF007F 0%, #D000FF 50%, #00FFFF 100%) !important;
            -webkit-background-clip: text !important;
            background-clip: text !important;
            color: transparent !important;
            text-shadow: none !important; /* CRITICAL BUG FIX FOR CHROMIUM MOBILE! */
            filter: drop-shadow(0 2px 14px rgba(255, 0, 127, 0.65)) !important;
            transition: all 0.3s ease;
            white-space: nowrap;
            padding: 0 8px;
        }
        
        html[data-theme="light"] .cursive-highlight {
            background-image: linear-gradient(135deg, #E11D48 0%, #7C3AED 50%, #0284C7 100%) !important;
            filter: drop-shadow(0 2px 10px rgba(124, 58, 237, 0.3)) !important;
        }

        input::placeholder {
            color: var(--text-secondary) !important;
            opacity: 0.6 !important;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col selection:bg-[#FF2E93] selection:text-white">

    <!-- 1. HEADER / NAVIGATION BAR -->
    <header class="sticky top-0 z-40 backdrop-blur-md transition-all border-b bg-[var(--navbar-bg)] border-[var(--border-color)]">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <!-- Brand Logo -->
            <a href="index.html" class="flex items-center gap-2.5 group">
                <span class="w-8 h-8 rounded-lg bg-gradient-to-tr from-[#FF2E93] to-[#A855F7] flex items-center justify-center shadow-lg shadow-purple-500/25">
                    <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </span>
                <span class="font-bold text-lg tracking-wider text-[var(--text-primary)] group-hover:text-[#00FFFF] transition">GENZEST</span>
            </a>

            <!-- Navigation Actions -->
            <div class="flex items-center gap-4">
                <span class="hidden sm:inline-block px-3 py-1 text-[10px] font-mono tracking-widest text-[#A855F7] bg-[#A855F7]/10 border border-[#A855F7]/30 rounded-full uppercase">
                    ● CONSOLE V2
                </span>
                <!-- Hamburger Menu Button -->
                <button id="menu-trigger" class="p-2 rounded-lg bg-[var(--card-bg)] border border-[var(--border-color)] text-[var(--text-primary)] hover:opacity-80 transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                </button>
            </div>
        </div>
    </header>

    <!-- MOBILE NAVIGATION SLIDE-OUT DRAWER OVERLAY -->
    <div id="drawer-overlay" class="fixed inset-0 bg-black/60 z-50 backdrop-blur-sm hidden opacity-0 transition-opacity duration-300"></div>
    
    <!-- MOBILE DRAWER PANEL -->
    <div id="drawer-panel" class="fixed top-0 right-0 h-full w-[85vw] max-w-sm bg-[var(--drawer-bg)] border-l border-[var(--border-color)] z-50 transform translate-x-full transition-transform duration-300 shadow-2xl flex flex-col p-6 text-[var(--text-primary)]">
        <!-- Close Header -->
        <div class="flex items-center justify-between pb-6 border-b border-[var(--border-color)]">
            <span class="font-bold tracking-wider text-[#A855F7] text-sm font-mono">CONSOLE MENU</span>
            <button id="drawer-close" class="p-2 rounded-lg bg-[var(--card-bg)] border border-[var(--border-color)] text-[var(--text-primary)] transition hover:opacity-80">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>

        <!-- Navigation Links inside Drawer -->
        <nav class="flex flex-col gap-4 py-8 flex-grow">
            <a href="index.html" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-[var(--border-color)] text-[var(--text-primary)] font-medium hover:opacity-80 transition">
                <span>&bull;</span> Home (Breakdowns)
            </a>
            <a href="about.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-[var(--text-secondary)] font-medium hover:bg-neutral-500/10 transition">
                <span>&bull;</span> About Us
            </a>
            <a href="disclaimer.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-[var(--text-secondary)] font-medium hover:bg-neutral-500/10 transition">
                <span>&bull;</span> Disclaimer
            </a>
            <a href="privacy.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-[var(--text-secondary)] font-medium hover:bg-neutral-500/10 transition">
                <span>&bull;</span> Privacy Policy
            </a>
        </nav>

        <!-- Dynamic Theme Toggler Block in Drawer -->
        <div class="pt-6 border-t border-[var(--border-color)]">
            <h4 class="text-xs font-mono tracking-widest text-[var(--text-secondary)] uppercase mb-4">Select Interface Vibe</h4>
            <div class="grid grid-cols-2 gap-3">
                <button id="theme-btn-dark" class="px-4 py-2.5 rounded-xl border border-[var(--border-color)] font-mono text-xs font-bold transition flex items-center justify-center gap-2">
                    <span class="w-2.5 h-2.5 rounded-full bg-purple-500"></span> Dark
                </button>
                <button id="theme-btn-light" class="px-4 py-2.5 rounded-xl border border-[var(--border-color)] font-mono text-xs font-bold transition flex items-center justify-center gap-2">
                    <span class="w-2.5 h-2.5 rounded-full bg-amber-400"></span> Light
                </button>
            </div>
        </div>
    </div>

    <!-- 2. HERO HEADER BLOCK -->
    <section class="relative pt-12 pb-6 flex flex-col items-center justify-center text-center overflow-visible">
        <!-- Ambient background glow elements -->
        <div class="absolute top-20 left-1/2 -translate-x-1/2 w-[70vw] h-[400px] bg-[#A855F7]/5 rounded-full blur-[120px] pointer-events-none"></div>
        
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
            <!-- Dynamic Compact Cursive Heading -->
            <h1 id="dyn-hero-title" class="text-5xl sm:text-8xl font-bold tracking-normal mb-8 font-['Caveat'] leading-[1.4] text-center text-[var(--text-primary)] block w-full px-2 overflow-visible">
                <!-- Injected dynamically by layout-handler.js -->
            </h1>
            
            <!-- High-Contrast Glassmorphic Subtitle Card -->
            <p id="dyn-hero-subtitle" class="max-w-3xl mx-auto text-sm sm:text-base tracking-wide font-semibold leading-relaxed mb-12 text-center block px-6 py-5 rounded-2xl border border-[var(--border-color)] bg-[var(--card-bg)] shadow-[0_0_25px_var(--glow-primary)]">
                <!-- Injected dynamically by layout-handler.js -->
            </p>
        </div>
    </section>

    <!-- 3. PREMIUM INTERACTIVE SEARCH SYSTEM -->
    <div class="max-w-2xl mx-auto w-full px-4 mb-14 relative z-20">
        <div class="relative">
            <input type="text" id="search-input" placeholder="Search Zepto, Blinkit, marketing moats..." class="w-full px-5 py-4 pl-12 bg-[var(--input-bg)] border-2 border-[var(--border-color)] text-[var(--text-primary)] rounded-2xl outline-none transition duration-300 focus:border-[#A855F7] focus:shadow-[0_0_25px_var(--glow-primary)] shadow-[0_4px_20px_var(--shadow-color)]">
            <span class="absolute left-4 top-1/2 transform -translate-y-1/2 text-[var(--text-secondary)]/50">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </span>
        </div>
    </div>

    <!-- 4. PLAYBOOK CARDS DYNAMIC GRID (INSTAGRAM SWIPE ON MOBILE) -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mb-20 relative z-10 flex-grow w-full">
        <div id="cases-container" class="flex md:grid flex-row md:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8 overflow-x-auto md:overflow-x-visible snap-x snap-mandatory md:snap-none scrollbar-none pb-8 md:pb-0">
            <!-- Loading backup block inside grid -->
            <div id="loading-spinner" class="col-span-full flex flex-col items-center justify-center py-16 w-full">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-[#A855F7] mb-4"></div>
                <p class="text-xs font-mono text-purple-400">Syncing live sheets...</p>
            </div>
        </div>

        <!-- Instagram Swipe Guidance Tag -->
        <div class="md:hidden text-center text-[10px] font-mono tracking-widest text-[#A855F7]/80 uppercase mt-4">
            Swipe Left-Right &rarr;
        </div>
    </main>

    <!-- 5. NEWSLETTER AUTOMATED CARD SECTION -->
    <section class="max-w-4xl mx-auto w-full px-4 mb-24 relative z-10">
        <div class="relative p-8 md:p-12 rounded-3xl overflow-hidden bg-[var(--card-bg)] border border-[var(--border-color)] shadow-[0_0_40px_var(--glow-primary)] text-center">
            <!-- Background lights -->
            <div class="absolute -top-24 -left-24 w-48 h-48 bg-purple-600/10 rounded-full blur-3xl"></div>
            <div class="absolute -bottom-24 -right-24 w-48 h-48 bg-cyan-600/10 rounded-full blur-3xl"></div>
            
            <h2 class="text-3xl md:text-4xl font-extrabold text-[var(--text-primary)] mb-4 tracking-tight">Studies Directly In Your Inbox</h2>
            <p class="text-sm md:text-base text-[var(--text-secondary)] max-w-lg mx-auto mb-8">Join modern founders and builders getting high-signal marketing breakdowns every week.</p>
            
            <!-- Newsletter Capture Form -->
            <form id="newsletter-form" class="max-w-md mx-auto flex flex-col gap-4">
                <input type="email" id="newsletter-email" required placeholder="Enter your professional email" class="px-5 py-4 bg-[var(--bg-base)] border border-[var(--border-color)] text-[var(--text-primary)] rounded-2xl outline-none transition duration-300 focus:border-[#A855F7]/60">
                <button type="submit" id="newsletter-btn" class="w-full px-5 py-4 font-bold text-white bg-gradient-to-r from-[#FF2E93] to-[#A855F7] rounded-2xl shadow-lg transition duration-300 hover:opacity-90 active:scale-[0.98]">
                    Subscribe Now
                </button>
                <span id="form-feedback" class="hidden text-xs font-mono mt-2"></span>
            </form>
        </div>
    </section>

    <!-- 6. DYNAMIC AUTOMATED FOOTER MOUNT NODE -->
    <div id="footer-component"></div>

    <!-- CORE SCRIPTS -->
    <script src="sheets/sheet-api.js"></script>
    <script src="sheets/newsletter.js"></script>
    <script src="assets/js/layout-handler.js"></script>
    <script src="assets/js/footer.js"></script>
    <script src="assets/js/ui-enhancer.js"></script>
    <script src="assets/js/main-cards.js"></script>
</body>
</html>
