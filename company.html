<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Startup Case Study Breakdown | GENZEST</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script>
        const savedTheme = localStorage.getItem("genzest-theme") || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute("data-theme", savedTheme);
    </script>
    <style>
        :root, html[data-theme="dark"] { --bg-base: #07020d; --text-primary: #FAFAFA; --text-secondary: #94a3b8; --card-bg: #0f0a1e; --border-color: rgba(168, 85, 247, 0.25); --navbar-bg: rgba(7, 2, 13, 0.85); --glow-primary: rgba(168, 85, 247, 0.25); }
        body { background-color: var(--bg-base); color: var(--text-primary); font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <header class="sticky top-0 z-40 backdrop-blur-md border-b bg-[var(--navbar-bg)] border-[var(--border-color)]">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="/index.html" class="px-3 py-1.5 rounded-xl bg-[var(--card-bg)] border border-[var(--border-color)] text-xs font-bold text-[var(--text-primary)]">&larr; Back to Playbooks</a>
            <a href="/index.html" class="font-bold text-lg tracking-wider text-[var(--text-primary)]">GENZEST</a>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-12 flex-grow w-full">
        <div class="hidden w-full aspect-video md:h-96 rounded-3xl overflow-hidden border border-[var(--border-color)] shadow-2xl mb-10 relative">
            <img id="comp-banner-img" src="" alt="Banner" class="w-full h-full object-cover">
        </div>
        <div class="flex items-center justify-center gap-3 mb-6">
            <span id="comp-industry" class="px-3 py-1 text-[10px] font-mono text-[#00FFFF] bg-purple-950/40 border border-[#A855F7]/30 rounded-full uppercase">Startup</span>
        </div>
        <h1 id="comp-title" class="text-3xl md:text-6xl font-black text-center mb-4">Loading...</h1>
        <p id="comp-hook" class="text-base text-center font-bold text-[#FF2E93] mb-12"></p>

        <div class="space-y-10">
            <div class="p-6 sm:p-10 rounded-3xl bg-[var(--card-bg)] border border-[var(--border-color)]">
                <h2 class="text-xs font-bold text-[#A855F7] mb-6">1. REVENUE FLOW MODEL</h2>
                <div id="comp-revenue" class="space-y-3"></div>
            </div>
            <div class="p-6 sm:p-10 rounded-3xl bg-[var(--card-bg)] border border-[var(--border-color)]">
                <h2 class="text-xs font-bold text-[#00FFFF] mb-6">2. THE MOAT MATRIX</h2>
                <div id="comp-moat" class="space-y-3"></div>
            </div>
            <div class="p-6 sm:p-10 rounded-3xl bg-[var(--card-bg)] border border-[var(--border-color)]">
                <h2 class="text-xs font-bold text-[#FF2E93] mb-6">3. MARKETING STRATEGY</h2>
                <div id="comp-marketing" class="space-y-3"></div>
            </div>
            <div class="p-6 sm:p-10 rounded-3xl bg-[var(--card-bg)] border border-[var(--border-color)]">
                <h2 class="text-xs font-bold text-emerald-400 mb-6">4. KEY TAKEAWAY</h2>
                <div id="comp-takeaway" class="space-y-3"></div>
            </div>
        </div>
    </main>

    <div id="footer-component"></div>

    <!-- ABSOLUTE PATH SCRIPTS -->
    <script src="/sheets/sheet-api.js"></script>
    <script src="/assets/js/layout-handler.js"></script>
    <script src="/assets/js/footer.js"></script>
    <script src="/assets/js/ui-enhancer.js"></script>
    <script src="/assets/js/company-page.js"></script>
</body>
</html>
