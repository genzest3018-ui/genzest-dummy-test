<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sitemap | GENZEST</title>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #07020d; color: #fff; padding: 40px; }
        h1 { color: #A855F7; }
        a { color: #fff; text-decoration: none; font-size: 18px; }
        a:hover { color: #A855F7; }
        ul { list-style: none; padding: 0; }
        li { margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 10px; }
    </style>
</head>
<body>
    <h1>GENZEST Sitemap</h1>
    <ul id="link-list">
        <li><a href="/">Home</a></li>
        <li><a href="/about.html">About Us</a></li>
        <li><a href="/privacy.html">Privacy Policy</a></li>
        <li><a href="/disclaimer.html">Disclaimer</a></li>
    </ul>

    <h2 style="margin-top: 40px;">Startup Case Studies</h2>
    <ul id="dynamic-link-list">
        </ul>

    <script>
        async function loadSitemap() {
            // Teri Sheet ka Public CSV URL
            const url = 'https://docs.google.com/spreadsheets/d/1pIjkKdOfYsTQFPGilIK0sgTJcH6EROZg9DELN8JQpSo/gviz/tq?tqx=out:csv';
            try {
                const response = await fetch(url);
                const raw = await response.text();
                const lines = raw.split('\n').slice(1);
                const list = document.getElementById('dynamic-link-list');
                
                lines.forEach(line => {
                    const path = line.split(',')[0].replace(/"/g, '').trim();
                    if(path) {
                        const li = document.createElement('li');
                        li.innerHTML = `<a href="/${path}">https://www.genzest.in/${path}</a>`;
                        list.appendChild(li);
                    }
                });
            } catch(e) { console.error("Sitemap load error:", e); }
        }
        loadSitemap();
    </script>
</body>
</html>
